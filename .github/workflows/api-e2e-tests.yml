name: API and E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-e2e-tests:
    runs-on: ubuntu-latest

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for Juice Shop
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready"
              exit 0
            fi
            echo "Waiting for Juice Shop..."
            sleep 2
          done
          exit 1

      - name: Run API Tests
        run: |
          cd api-tests/juice-shop-api
          mvn clean test -Denv=dev

      - name: Install E2E dependencies
        run: |
          cd e2e-tests
          npm ci

      - name: Install Playwright Browsers
        run: |
          cd e2e-tests
          npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: |
          cd e2e-tests
          npm run test:e2e

      - name: Upload API Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-results
          path: api-tests/juice-shop-api/target/allure-results

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cucumber-report
          path: e2e-tests/reports