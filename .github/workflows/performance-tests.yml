name: Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
  workflow_dispatch:

jobs:
  performance-tests:
    runs-on: ubuntu-latest

    services:
      juice-shop:
        image: bkimminich/juice-shop
        ports:
          - 3000:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Wait for Juice Shop
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Juice Shop is ready"
              exit 0
            fi
            echo "Waiting for Juice Shop..."
            sleep 2
          done
          exit 1

      - name: Run Smoke Test
        run: k6 run performance-tests/k6/scripts/smoke-test.js -e BASE_URL=http://localhost:3000

      - name: Run Load Test
        run: k6 run performance-tests/k6/scripts/load-test.js -e BASE_URL=http://localhost:3000